{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-5">
        <h2 class="mb-3">Вход</h2>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary">Войти</button>
            <a href="{% url 'signup' %}" class="btn btn-outline-secondary">Регистрация</a>
        </form>
    </div>
</div>
{% endblock %}
