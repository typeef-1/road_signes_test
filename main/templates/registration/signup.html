{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-5">
        <h2 class="mb-3">Регистрация</h2>
        <p class="text-muted">Создайте аккаунт, чтобы создавать и проходить голосования.</p>

        <form method="post" class="mt-3">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary">Зарегистрироваться</button>
            <a href="{% url 'login' %}" class="btn btn-outline-secondary">Уже есть аккаунт</a>
        </form>
    </div>
</div>
{% endblock %}
